name: Daily Report

on:
  schedule:
    # 北京时间每天早上 6:00 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]
    paths:
      - '.github/workflows/daily.yml'
      - 'daily.py'
      - 'sources/**'
      - 'templates/**'
      - 'notify.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write  # gh-pages 部署需要

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare config
        run: |
          cp config.example.yaml config.yaml
          # 注入 GitHub Secrets
          for secret in AI_API_KEY AI_BASE_URL AI_MODEL WECHAT_WEBHOOK \
                       EMAIL_HOST EMAIL_USER EMAIL_PASS EMAIL_TO PAGES_URL; do
            val=$(printenv "$secret" 2>/dev/null || true)
            if [ -n "$val" ]; then
              case "$secret" in
                AI_API_KEY)
                  sed -i "s|your-api-key-here|$val|" config.yaml ;;
                AI_BASE_URL)
                  sed -i "s|https://api.deepseek.com/v1|$val|" config.yaml ;;
                AI_MODEL)
                  sed -i "s|deepseek-chat|$val|" config.yaml ;;
                WECHAT_WEBHOOK)
                  sed -i "s|wechat_webhook: \"\"|wechat_webhook: \"$val\"|" config.yaml ;;
                EMAIL_HOST)
                  sed -i "s|email_smtp_host: \"\"|email_smtp_host: \"$val\"|" config.yaml ;;
                EMAIL_USER)
                  sed -i "s|email_user: \"\"|email_user: \"$val\"|" config.yaml ;;
                EMAIL_PASS)
                  sed -i "s|email_pass: \"\"|email_pass: \"$val\"|" config.yaml ;;
                EMAIL_TO)
                  sed -i "s|email_to: \"\"|email_to: \"$val\"|" config.yaml ;;
                PAGES_URL)
                  sed -i "s|pages_url: \"\"|pages_url: \"$val\"|" config.yaml ;;
              esac
            fi
          done
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PAGES_URL: ${{ secrets.PAGES_URL }}

      - name: Generate & notify
        run: python daily.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true
          commit_message: "deploy: ${{ github.sha }}"

      - name: Summary
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "### TheDailyMe · $TODAY" >> $GITHUB_STEP_SUMMARY
          echo "[查看日报](https://heguang-mercy.github.io/TheDailyMe/${TODAY}.html)" >> $GITHUB_STEP_SUMMARY
